<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sanctum Vault — Order of Zero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Cormorant+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════════════ */
:root {
  /* Core palette */
  --ink:       #08080f;
  --ink-1:     #0e0e1c;
  --ink-2:     #141428;
  --ink-3:     #1c1c35;
  --surface:   rgba(18,18,32,0.72);
  --surface-hi:rgba(26,26,48,0.85);
  --border:    rgba(212,180,100,0.14);
  --border-hi: rgba(212,180,100,0.32);

  /* Gold system */
  --g0: #fff0b0;
  --g1: #f2c84a;
  --g2: #c9a148;
  --g3: #8a6b28;
  --g4: #3e2f10;
  --g-glow: rgba(242,200,74,0.18);
  --g-glow-hi: rgba(242,200,74,0.38);

  /* Accents */
  --ruby:   #b03040;
  --ruby-lo:#5a0f18;
  --teal:   #3a8fa0;
  --teal-lo:#0f3038;

  /* Text */
  --tx-base:  #e2d6b8;
  --tx-dim:   #7a7060;
  --tx-hi:    #f8f0d8;
  --tx-faint: #3a3428;

  /* Radii */
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;

  /* Transitions */
  --ease: cubic-bezier(0.22,1,0.36,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; font-size: 16px; }
body {
  height: 100%;
  background: var(--ink);
  color: var(--tx-base);
  font-family: 'Cormorant Garamond', Georgia, serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════
   AMBIENT BACKGROUND
═══════════════════════════════════════════ */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* Noise grain overlay */
.grain {
  position: fixed; inset: -50%;
  width: 200%; height: 200%;
  z-index: 1; pointer-events: none;
  opacity: 0.028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  animation: grainShift 0.4s steps(1) infinite;
}
@keyframes grainShift { 0%{transform:translate(0,0)}25%{transform:translate(-5%,-8%)}50%{transform:translate(4%,3%)}75%{transform:translate(-3%,7%)}100%{transform:translate(7%,-4%)} }

/* ═══════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════ */
#shell {
  position: relative; z-index: 2;
  height: 100vh;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  grid-template-columns: 1fr;
  max-width: 880px;
  margin: 0 auto;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
#hdr {
  grid-row: 1;
  padding: 18px 28px 14px;
  display: flex;
  align-items: center;
  gap: 18px;
  background: linear-gradient(180deg, rgba(8,8,15,0.98) 0%, rgba(8,8,15,0.80) 100%);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

/* Animated shimmer line */
#hdr::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--g3) 15%,
    var(--g1) 40%,
    var(--g0) 50%,
    var(--g1) 60%,
    var(--g3) 85%,
    transparent 100%);
  opacity: 0.6;
  animation: shimmer 6s ease-in-out infinite;
}
@keyframes shimmer { 0%,100%{opacity:.35} 50%{opacity:.85} }

/* Sigil mark */
.hdr-sigil {
  flex-shrink: 0;
  width: 48px; height: 48px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.hdr-sigil svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 8px var(--g2)) drop-shadow(0 0 20px rgba(201,161,72,0.25));
  animation: sigilBreath 4s ease-in-out infinite;
}
@keyframes sigilBreath {
  0%,100% { filter: drop-shadow(0 0 6px var(--g2)) drop-shadow(0 0 16px rgba(201,161,72,.2)); transform: scale(1); }
  50% { filter: drop-shadow(0 0 14px var(--g1)) drop-shadow(0 0 30px rgba(242,200,74,.35)); transform: scale(1.04); }
}

/* Title block */
.hdr-text { flex: 1; min-width: 0; }
.hdr-title {
  font-family: 'Cormorant SC', serif;
  font-weight: 600;
  font-size: clamp(13px, 2.2vw, 19px);
  color: var(--g1);
  letter-spacing: 0.22em;
  text-shadow: 0 0 24px var(--g-glow), 0 0 60px rgba(242,200,74,0.12);
  line-height: 1;
}
.hdr-sub {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 300;
  font-size: clamp(7.5px, 1vw, 9.5px);
  color: var(--g3);
  letter-spacing: 0.18em;
  margin-top: 5px;
  opacity: 0.8;
}

/* Header pills */
.hdr-pills {
  display: flex; gap: 7px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end;
}
.pill {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5px; font-weight: 400;
  color: var(--tx-dim);
  letter-spacing: 0.08em;
  white-space: nowrap;
  transition: border-color 0.3s, background 0.3s;
}
.pill.active { border-color: var(--border-hi); color: var(--g2); background: rgba(242,200,74,0.06); }
.pill-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--tx-faint);
  flex-shrink: 0;
}
.pill-dot.on { background: var(--g2); box-shadow: 0 0 5px var(--g2); animation: pillBlink 2.5s ease-in-out infinite; }
.pill-dot.ruby { background: var(--ruby); box-shadow: 0 0 5px var(--ruby); animation: pillBlink 2s ease-in-out infinite; }
.pill-dot.teal { background: var(--teal); box-shadow: 0 0 5px var(--teal); animation: pillBlink 3s ease-in-out infinite; }
@keyframes pillBlink { 0%,100%{opacity:1} 50%{opacity:0.25} }

@media (max-width: 600px) { .hdr-pills { display: none; } }

/* ═══════════════════════════════════════════
   QUICK PROMPTS STRIP
═══════════════════════════════════════════ */
#prompts-strip {
  grid-row: 2;
  display: flex; gap: 6px;
  padding: 10px 28px;
  overflow-x: auto;
  background: rgba(8,8,15,0.6);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
  -ms-overflow-style: none;
  flex-shrink: 0;
}
#prompts-strip::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  padding: 5px 13px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.025);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 400;
  color: var(--tx-dim);
  letter-spacing: 0.07em;
  cursor: pointer;
  transition: all 0.22s var(--ease);
  white-space: nowrap;
}
.chip:hover {
  border-color: var(--border-hi);
  background: rgba(242,200,74,0.07);
  color: var(--g1);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(0,0,0,0.35), 0 0 10px rgba(242,200,74,0.08);
}
.chip:active { transform: translateY(0); }

/* ═══════════════════════════════════════════
   CHAT AREA
═══════════════════════════════════════════ */
#chat-area {
  grid-row: 3;
  overflow-y: auto;
  padding: 28px 28px 12px;
  display: flex; flex-direction: column; gap: 24px;
  scroll-behavior: smooth;
}
#chat-area::-webkit-scrollbar { width: 4px; }
#chat-area::-webkit-scrollbar-track { background: transparent; }
#chat-area::-webkit-scrollbar-thumb { background: var(--g4); border-radius: 4px; }
#chat-area { scrollbar-width: thin; scrollbar-color: var(--g4) transparent; }

/* ═══════════════════════════════════════════
   WELCOME SCREEN
═══════════════════════════════════════════ */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  padding: 40px 20px 24px;
  animation: wFadeUp 1.2s var(--ease) both;
}
@keyframes wFadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

.welcome-seal {
  width: 80px; height: 80px;
  margin-bottom: 24px;
  animation: sealSpin 30s linear infinite;
  filter: drop-shadow(0 0 16px rgba(242,200,74,0.4));
}
@keyframes sealSpin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

.welcome h2 {
  font-family: 'Cormorant SC', serif;
  font-weight: 500;
  font-size: clamp(16px, 3vw, 24px);
  color: var(--g1);
  letter-spacing: 0.18em;
  text-shadow: 0 0 24px var(--g-glow);
  margin-bottom: 12px;
}
.welcome p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(12px, 1.8vw, 14.5px);
  color: var(--tx-dim);
  line-height: 1.85;
  max-width: 480px;
  margin-bottom: 22px;
}
.clearance-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 18px;
  border-radius: 100px;
  border: 1px solid var(--border-hi);
  background: rgba(242,200,74,0.06);
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  color: var(--g2);
  letter-spacing: 0.14em;
}
.clearance-badge::before, .clearance-badge::after {
  content: '◈';
  font-size: 9px;
  color: var(--g3);
}

/* ═══════════════════════════════════════════
   MESSAGE ROWS
═══════════════════════════════════════════ */
.msg-row {
  display: flex;
  gap: 12px;
  animation: msgIn 0.38s var(--ease) both;
  opacity: 0;
  transform: translateY(16px);
}
@keyframes msgIn { to{opacity:1;transform:translateY(0)} }

.msg-row.user { flex-direction: row-reverse; }
.msg-row.assistant { flex-direction: row; }

/* Avatar */
.avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  margin-top: 2px;
  border: 1px solid var(--border);
}
.avatar.user-av {
  background: linear-gradient(135deg, var(--ruby-lo), rgba(90,15,24,0.8));
  border-color: rgba(176,48,64,0.4);
  color: var(--ruby);
}
.avatar.bot-av {
  background: linear-gradient(135deg, var(--g4), rgba(62,47,16,0.8));
  border-color: var(--border-hi);
  color: var(--g2);
  animation: avatarPulse 4s ease-in-out infinite;
}
@keyframes avatarPulse {
  0%,100% { box-shadow: 0 0 0 0 transparent, 0 0 6px rgba(201,161,72,0.2); }
  50% { box-shadow: 0 0 0 3px rgba(201,161,72,0.08), 0 0 14px rgba(201,161,72,0.3); }
}

/* Bubble body */
.bubble-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }

.bubble-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; font-weight: 400;
  letter-spacing: 0.12em;
  opacity: 0.55;
}
.msg-row.user .bubble-meta { text-align: right; color: var(--ruby); }
.msg-row.assistant .bubble-meta { color: var(--g3); }

.bubble {
  padding: 14px 18px;
  border-radius: var(--r-md);
  line-height: 1.82;
  font-size: clamp(13px, 1.9vw, 14.5px);
  position: relative;
  max-width: 100%;
  word-break: break-word;
}

/* User bubble */
.msg-row.user .bubble {
  background: linear-gradient(135deg, rgba(80,12,22,0.65) 0%, rgba(50,8,14,0.75) 100%);
  border: 1px solid rgba(176,48,64,0.25);
  border-top-right-radius: 4px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
  font-style: italic;
  color: var(--tx-base);
  backdrop-filter: blur(10px);
  align-self: flex-end;
}

/* Assistant bubble */
.msg-row.assistant .bubble {
  background: linear-gradient(160deg, rgba(20,20,40,0.75) 0%, rgba(14,14,28,0.85) 100%);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  box-shadow: 0 4px 28px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03);
  backdrop-filter: blur(16px);
  color: var(--tx-base);
}

/* Part badge */
.part-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  border-radius: 100px;
  border: 1px solid var(--g4);
  background: rgba(242,200,74,0.05);
  font-family: 'JetBrains Mono', monospace;
  font-size: 7.5px;
  color: var(--g3);
  letter-spacing: 0.1em;
  margin-bottom: 12px;
}
.part-tag::before { content: '◈'; font-size: 7px; }

/* ═══════════════════════════════════════════
   RICH CONTENT INSIDE BUBBLES
═══════════════════════════════════════════ */
.bubble .section-header {
  display: block;
  font-family: 'Cormorant SC', serif;
  font-weight: 600;
  font-size: clamp(11.5px, 1.8vw, 13.5px);
  color: var(--g0);
  letter-spacing: 0.18em;
  padding: 9px 14px 9px 16px;
  margin: 20px -18px 12px;
  background: linear-gradient(90deg, rgba(242,200,74,0.1) 0%, rgba(242,200,74,0.03) 60%, transparent 100%);
  border-left: 2px solid var(--g2);
  text-shadow: 0 0 12px rgba(242,200,74,0.25);
}

.bubble .sub-header {
  display: block;
  font-family: 'Cormorant SC', serif;
  font-weight: 500;
  font-size: clamp(10.5px, 1.6vw, 12px);
  color: var(--g1);
  letter-spacing: 0.14em;
  margin: 16px 0 7px;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(242,200,74,0.12);
}

.bubble strong, .bubble b {
  color: var(--g0);
  font-weight: 600;
}

.bubble em, .bubble i {
  color: var(--silver, #b8b8cc);
  font-style: italic;
}

.bubble p { margin: 9px 0; }
.bubble p:first-child { margin-top: 0; }
.bubble p:last-child { margin-bottom: 0; }

.bubble ul, .bubble ol {
  padding-left: 22px;
  margin: 9px 0;
}
.bubble li { margin: 5px 0; line-height: 1.72; }
.bubble li::marker { color: var(--g3); }

.bubble hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}

.bubble code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85em;
  background: rgba(242,200,74,0.07);
  border: 1px solid rgba(242,200,74,0.14);
  padding: 1px 6px;
  border-radius: 4px;
  color: var(--g1);
}

.bubble blockquote {
  border-left: 2px solid var(--g3);
  padding: 6px 14px;
  margin: 10px 0;
  color: var(--tx-dim);
  font-style: italic;
  background: rgba(242,200,74,0.025);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
}

/* Continue button */
.continue-btn {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 16px;
  padding: 9px 20px;
  border-radius: 100px;
  border: 1px solid var(--border-hi);
  background: rgba(242,200,74,0.07);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--g1);
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.25s var(--ease);
}
.continue-btn:hover {
  background: rgba(242,200,74,0.14);
  border-color: var(--g2);
  box-shadow: 0 4px 18px rgba(0,0,0,0.3), 0 0 14px rgba(242,200,74,0.12);
  transform: translateY(-1px);
}
.continue-btn::before { content: '▶'; font-size: 7px; opacity: 0.7; }

/* ═══════════════════════════════════════════
   THINKING INDICATOR
═══════════════════════════════════════════ */
.thinking-row {
  display: flex; gap: 12px; align-items: flex-start;
  animation: msgIn 0.3s var(--ease) both;
}
.thinking-av {
  width: 34px; height: 34px;
  border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--g4), rgba(62,47,16,0.8));
  border: 1px solid var(--border-hi);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--g2);
  animation: avatarPulse 1.5s ease-in-out infinite;
}
.thinking-bubble {
  background: linear-gradient(160deg, rgba(20,20,40,0.75) 0%, rgba(14,14,28,0.85) 100%);
  border: 1px solid var(--border);
  border-radius: var(--r-md); border-top-left-radius: 4px;
  padding: 14px 18px;
  backdrop-filter: blur(16px);
}
.thinking-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px; color: var(--g3); letter-spacing: 0.14em;
  margin-bottom: 10px;
}
.thinking-bars {
  display: flex; gap: 4px; align-items: flex-end; height: 20px;
}
.t-bar {
  width: 3px; border-radius: 3px; background: var(--g3);
  animation: barPulse 1.2s ease-in-out infinite;
}
.t-bar:nth-child(1){height:8px;animation-delay:0s}
.t-bar:nth-child(2){height:14px;animation-delay:.15s}
.t-bar:nth-child(3){height:10px;animation-delay:.3s}
.t-bar:nth-child(4){height:18px;animation-delay:.45s}
.t-bar:nth-child(5){height:6px;animation-delay:.6s}
.t-bar:nth-child(6){height:12px;animation-delay:.75s}
.t-bar:nth-child(7){height:16px;animation-delay:.9s}
@keyframes barPulse {
  0%,100%{opacity:.3;transform:scaleY(.6)}
  50%{opacity:1;transform:scaleY(1);background:var(--g1)}
}

/* ═══════════════════════════════════════════
   INPUT AREA
═══════════════════════════════════════════ */
#input-area {
  grid-row: 4;
  padding: 14px 28px 20px;
  background: linear-gradient(0deg, rgba(8,8,15,0.98) 0%, rgba(8,8,15,0.85) 100%);
  backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  position: relative;
}
#input-area::before {
  content: '';
  position: absolute; top: 0; left: 28px; right: 28px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--g3), transparent);
  opacity: 0.4;
}

.input-shell {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: rgba(255,255,255,0.035);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 10px 12px 10px 18px;
  transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
}
.input-shell:focus-within {
  border-color: var(--border-hi);
  background: rgba(255,255,255,0.055);
  box-shadow: 0 0 0 3px rgba(242,200,74,0.07), 0 8px 32px rgba(0,0,0,0.4);
}

#user-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  color: var(--tx-hi);
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(13px, 1.9vw, 15px);
  line-height: 1.65;
  min-height: 26px;
  max-height: 160px;
  padding: 2px 0;
  scrollbar-width: none;
}
#user-input::-webkit-scrollbar { display: none; }
#user-input::placeholder {
  color: var(--tx-faint);
  font-style: italic;
  font-size: 13px;
}

#send-btn {
  flex-shrink: 0;
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1px solid var(--border-hi);
  background: linear-gradient(135deg, rgba(242,200,74,0.2), rgba(201,161,72,0.1));
  color: var(--g1);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s var(--ease);
  position: relative;
  overflow: hidden;
}
#send-btn::before {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle, var(--g1) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.25s;
}
#send-btn:hover {
  background: linear-gradient(135deg, rgba(242,200,74,0.35), rgba(201,161,72,0.2));
  border-color: var(--g2);
  box-shadow: 0 0 20px rgba(242,200,74,0.2), 0 4px 14px rgba(0,0,0,0.3);
  transform: scale(1.06);
}
